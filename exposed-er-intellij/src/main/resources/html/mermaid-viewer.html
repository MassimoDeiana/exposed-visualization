<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2b2b2b;
            color: #a9b7c6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: auto;
        }
        #diagram {
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        #diagram svg {
            max-width: 100%;
            height: auto;
        }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="placeholder">No Exposed tables found. Open a project with Exposed table definitions.</div>
    <div id="diagram" style="display: none;"></div>
    <script src="mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            theme: 'dark',
            startOnLoad: false,
            securityLevel: 'loose'
        });

        let renderCount = 0;

        function renderDiagram(mermaidCode) {
            renderCount++;
            const currentRender = renderCount;
            const placeholder = document.getElementById('placeholder');
            const diagramEl = document.getElementById('diagram');

            mermaid.render('er-' + currentRender, mermaidCode).then(function(result) {
                if (currentRender === renderCount) {
                    placeholder.style.display = 'none';
                    diagramEl.style.display = 'flex';
                    diagramEl.innerHTML = result.svg;
                }
            }).catch(function(err) {
                placeholder.style.display = 'flex';
                placeholder.textContent = 'Diagram render error: ' + err.message;
                diagramEl.style.display = 'none';
            });
        }
    </script>
</body>
</html>
