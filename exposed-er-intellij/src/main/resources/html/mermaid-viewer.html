<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2b2b2b;
            color: #a9b7c6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #viewport.move-mode {
            cursor: grab;
        }
        #viewport.dragging {
            cursor: grabbing;
        }
        #diagram {
            transform-origin: 0 0;
            display: inline-block;
            padding: 16px;
        }
        #placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            color: #666;
            font-size: 14px;
        }
        #controls {
            position: fixed;
            bottom: 12px;
            right: 12px;
            display: none;
            gap: 4px;
            align-items: center;
            z-index: 100;
        }
        #controls button {
            width: 30px;
            height: 30px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #3c3f41;
            color: #a9b7c6;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        #controls button:hover {
            background: #4c5052;
        }
        #controls button:active, #controls button.active {
            background: #2d5c88;
            border-color: #4a88c7;
        }
        #zoom-level {
            color: #666;
            font-size: 11px;
            padding: 0 4px;
        }
    </style>
</head>
<body>
    <div id="placeholder">No Exposed tables found. Open a project with Exposed table definitions.</div>
    <div id="viewport" style="display: none;">
        <div id="diagram"></div>
    </div>
    <div id="controls">
        <button id="move-btn" title="Toggle move mode — hold click to drag diagram">&#10021;</button>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">&minus;</button>
        <button id="zoom-fit" title="Fit to view">&#8644;</button>
        <button id="zoom-reset" title="Reset to 100%">1:1</button>
        <span id="zoom-level">100%</span>
    </div>
    <script src="mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            theme: 'dark',
            startOnLoad: false,
            securityLevel: 'loose'
        });

        var renderCount = 0;
        var scale = 1;
        var translateX = 0;
        var translateY = 0;
        var moveMode = false;
        var isDragging = false;
        var dragStartX = 0;
        var dragStartY = 0;
        var dragStartTX = 0;
        var dragStartTY = 0;

        var viewport = document.getElementById('viewport');
        var diagramEl = document.getElementById('diagram');
        var controls = document.getElementById('controls');
        var zoomLevel = document.getElementById('zoom-level');
        var moveBtn = document.getElementById('move-btn');

        function applyTransform() {
            diagramEl.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
            zoomLevel.textContent = Math.round(scale * 100) + '%';
        }

        function zoomBy(factor) {
            var cx = viewport.clientWidth / 2;
            var cy = viewport.clientHeight / 2;
            var oldScale = scale;
            scale = Math.max(0.05, Math.min(20, scale * factor));
            translateX = cx - (cx - translateX) * (scale / oldScale);
            translateY = cy - (cy - translateY) * (scale / oldScale);
            applyTransform();
        }

        function fitToViewSimple() {
            var svg = diagramEl.querySelector('svg');
            if (!svg) return;
            scale = 1;
            translateX = 0;
            translateY = 0;
            applyTransform();

            requestAnimationFrame(function() {
                var svgW = svg.getBoundingClientRect().width;
                var svgH = svg.getBoundingClientRect().height;
                var vw = viewport.clientWidth;
                var vh = viewport.clientHeight;
                var scaleX = (vw - 32) / svgW;
                var scaleY = (vh - 32) / svgH;
                scale = Math.min(scaleX, scaleY, 2);
                translateX = Math.max(0, (vw - svgW * scale) / 2);
                translateY = Math.max(0, (vh - svgH * scale) / 2);
                applyTransform();
            });
        }

        // Move mode toggle
        moveBtn.addEventListener('click', function() {
            moveMode = !moveMode;
            moveBtn.classList.toggle('active', moveMode);
            viewport.classList.toggle('move-mode', moveMode);
        });

        // Drag to pan when in move mode
        viewport.addEventListener('mousedown', function(e) {
            if (!moveMode || e.button !== 0) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartTX = translateX;
            dragStartTY = translateY;
            viewport.classList.add('dragging');
            e.preventDefault();
        });

        window.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            translateX = dragStartTX + (e.clientX - dragStartX);
            translateY = dragStartTY + (e.clientY - dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', function() {
            if (!isDragging) return;
            isDragging = false;
            viewport.classList.remove('dragging');
        });

        // Zoom buttons
        document.getElementById('zoom-in').addEventListener('click', function() { zoomBy(1.3); });
        document.getElementById('zoom-out').addEventListener('click', function() { zoomBy(0.7); });
        document.getElementById('zoom-fit').addEventListener('click', function() { fitToViewSimple(); });
        document.getElementById('zoom-reset').addEventListener('click', function() {
            scale = 1; translateX = 0; translateY = 0; applyTransform();
        });

        function renderDiagram(mermaidCode) {
            renderCount++;
            var currentRender = renderCount;
            var placeholder = document.getElementById('placeholder');

            mermaid.render('er-' + currentRender, mermaidCode).then(function(result) {
                if (currentRender === renderCount) {
                    placeholder.style.display = 'none';
                    viewport.style.display = 'block';
                    controls.style.display = 'flex';
                    diagramEl.innerHTML = result.svg;
                    var svg = diagramEl.querySelector('svg');
                    if (svg) {
                        svg.style.maxWidth = 'none';
                        svg.style.height = 'auto';
                    }
                    fitToViewSimple();
                }
            }).catch(function(err) {
                placeholder.style.display = 'flex';
                placeholder.textContent = 'Diagram render error: ' + err.message;
                viewport.style.display = 'none';
                controls.style.display = 'none';
            });
        }
    </script>
</body>
</html>
