<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- Top table -->
  <rect x="1" y="1" width="5.5" height="2" rx="0.5" fill="#6C707E"/>
  <rect x="1" y="3" width="5.5" height="2.5" fill="#6C707E" opacity="0.35"/>

  <!-- Bottom table -->
  <rect x="9.5" y="10.5" width="5.5" height="2" rx="0.5" fill="#6C707E"/>
  <rect x="9.5" y="12.5" width="5.5" height="2.5" fill="#6C707E" opacity="0.35"/>

  <!-- Relationship line -->
  <path d="M 6.5 3.5 L 9 3.5 L 9 11.5" stroke="#6C707E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- One mark (||) at top end -->
  <line x1="6.2" y1="2.5" x2="6.2" y2="4.5" stroke="#6C707E" stroke-width="1"/>

  <!-- Many mark (>) at bottom end -->
  <path d="M 7.8 11.5 L 9 9.8 L 10.2 11.5" stroke="#6C707E" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
